<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단한 퍼즐 게임</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="screen-overlay" id="startScreen" aria-label="게임 시작 화면">
      <div class="screen-card">
        <p class="screen-kicker">Puzzle Game</p>
        <h2 class="screen-title">게임 시작</h2>
        <p class="screen-text">
          쉬움부터 어려움까지 단계가 자동으로 올라갑니다.<br />
          제한 시간 안에 모든 퍼즐을 맞춰 보세요.
        </p>
        <div class="screen-actions">
          <button class="screen-button" id="startScreenButton" type="button">게임 시작</button>
        </div>
      </div>
    </section>

    <section class="screen-overlay hidden" id="endScreen" aria-label="게임 종료 화면">
      <div class="screen-card">
        <p class="screen-kicker">Completed</p>
        <h2 class="screen-title">축하합니다</h2>
        <p class="screen-text" id="endScreenMessage">모든 단계를 통과했습니다.</p>
        <div class="screen-actions">
          <button class="screen-button secondary" id="endScreenButton" type="button">처음부터 다시</button>
        </div>
      </div>
    </section>

    <h1 class="title">간단한 퍼즐 게임</h1>
    <p class="subtitle">같은 그림 2개를 찾아 모두 맞추면 클리어입니다.</p>

    <section class="toolbar" aria-label="게임 정보">
      <div class="attempts">시도 횟수: <span id="attemptCount">0</span></div>
      <div class="timer" id="timer">남은 시간: <span id="timeRemaining">0</span>초</div>
      <label class="level-control" for="levelSelect">
        단계
        <select class="level-select" id="levelSelect">
          <option value="easy">쉬움</option>
          <option value="medium" selected>중간</option>
          <option value="medium1">중간1</option>
          <option value="medium2">중간2</option>
          <option value="hard">어려움</option>
        </select>
      </label>
      <div class="action_buttons">
        <button class="start" id="startButton" type="button">게임 시작</button>
        <button class="restart" id="restartButton" type="button">다시 시작</button>
      </div>
    </section>

    <section class="board" id="board" aria-label="퍼즐 보드"></section>

    <div class="message" id="message">같은 그림을 찾아서 짝을 맞춰보세요.</div>
  </main>

  <script src="./script.js"></script>
</body>
</html>
