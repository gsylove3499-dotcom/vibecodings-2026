<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단한 퍼즐 게임</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --board: #b9f2c6;
      --board-border: #9be7af;
      --accent: #2f6fed;
      --accent-hover: #2459c9;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 36%),
        linear-gradient(180deg, #eff3fb 0%, #f6f8fc 100%);
    }

    .app {
      width: min(100%, 430px);
      background: var(--card);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 28px 22px 20px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -0.03em;
      font-weight: 800;
    }

    .subtitle {
      margin: 10px 0 22px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .attempts {
      font-size: 18px;
      font-weight: 700;
    }

    .action_buttons {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .start {
      border: 0;
      background: #22c55e;
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 8px 18px rgba(34, 197, 94, 0.18);
    }

    .start:hover {
      background: #16a34a;
    }

    .start:active {
      transform: translateY(1px);
    }

    .restart {
      border: 0;
      background: var(--accent);
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 8px 18px rgba(47, 111, 237, 0.18);
    }

    .restart:hover {
      background: var(--accent-hover);
    }

    .restart:active {
      transform: translateY(1px);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 8px 0 18px;
    }

    .board.previewing {
      pointer-events: none;
    }

    .board.inactive {
      pointer-events: none;
    }

    .card {
      aspect-ratio: 1 / 1;
      border: 1px solid var(--board-border);
      border-radius: 16px;
      background: linear-gradient(180deg, #bdf5cc 0%, #abefbf 100%);
      display: grid;
      place-items: center;
      font-size: 28px;
      cursor: pointer;
      user-select: none;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      transition: transform 0.15s ease, filter 0.2s ease, background 0.2s ease;
    }

    .board.inactive .card {
      background: linear-gradient(180deg, #e5e7eb 0%, #d1d5db 100%);
      border-color: #cbd5e1;
      filter: grayscale(1) saturate(0.2);
      cursor: default;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    .card:hover {
      transform: translateY(-1px);
      filter: brightness(1.01);
    }

    .board.inactive .card:hover {
      transform: none;
      filter: grayscale(1) saturate(0.2);
    }

    .card:disabled {
      cursor: default;
    }

    .card .emoji {
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .card.flipped,
    .card.matched {
      background: linear-gradient(180deg, #d4f8dd 0%, #bdf5cc 100%);
    }

    .board.inactive .card.flipped,
    .board.inactive .card.matched {
      background: linear-gradient(180deg, #e5e7eb 0%, #d1d5db 100%);
    }

    .card.previewing {
      transform: translateY(-4px) scale(1.02);
      filter: brightness(1.02);
    }

    .card.flipped .emoji,
    .card.matched .emoji {
      opacity: 1;
      transform: scale(1);
    }

    .card.matched {
      box-shadow: inset 0 0 0 1px rgba(47, 111, 237, 0.08);
    }

    .board.inactive .card .emoji {
      opacity: 0 !important;
      transform: scale(0.85);
    }

    .message {
      min-height: 28px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      line-height: 1.4;
      color: #1f2937;
    }

    .message.done {
      color: #1f6b34;
    }

    @media (max-width: 420px) {
      .app {
        padding: 22px 16px 18px;
        border-radius: 18px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
      }

      .attempts {
        font-size: 16px;
      }

      .restart {
        padding: 10px 14px;
      }

      .start {
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">간단한 퍼즐 게임</h1>
    <p class="subtitle">같은 그림 2개를 찾아 모두 맞추면 클리어입니다.</p>

    <section class="toolbar" aria-label="게임 정보">
      <div class="attempts">시도 횟수: <span id="attemptCount">0</span></div>
      <div class="action_buttons">
        <button class="start" id="startButton" type="button">게임 시작</button>
        <button class="restart" id="restartButton" type="button">다시 시작</button>
      </div>
    </section>

    <section class="board" id="board" aria-label="퍼즐 보드"></section>

    <div class="message" id="message">같은 그림을 찾아서 짝을 맞춰보세요.</div>
  </main>

  <script>
    // 맞춰야 할 과일 후보 목록입니다.
    // 한 판마다 여기서 8개를 무작위로 골라서 사용합니다.
    const fruit_pool = [
      "🍇", "🍓", "🥝", "🍑",
      "🍎", "🍉", "🍒", "🍊",
      "🍐", "🍋", "🍌", "🍍",
      "🥭", "🍈", "🫐", "🍏",
    ];

    // 한 판에 사용할 카드 쌍의 개수입니다.
    const pair_count = 8;

    // 프리뷰 애니메이션 전체 시간입니다.
    // 기존보다 약 30% 느리게 보이도록 조금 늘립니다.
    const preview_duration_ms = 1450;

    // 프리뷰 중 카드가 하나씩 보이는 간격입니다.
    // 60ms보다 느리게 보여서 슬라이드 속도가 약 70% 정도로 보입니다.
    const preview_step_ms = 85;

    // 화면에서 사용할 DOM 요소를 미리 찾아 둡니다.
    const board_element = document.getElementById("board");
    const attempt_count_element = document.getElementById("attemptCount");
    const start_button = document.getElementById("startButton");
    const restart_button = document.getElementById("restartButton");
    const message_element = document.getElementById("message");

    // 현재 게임 상태를 저장하는 변수들입니다.
    let first_card = null;
    let second_card = null;
    let board_locked = true;
    let is_game_ready = false;
    let attempt_count = 0;
    let matched_pairs = 0;
    let mismatch_timer_id = null;
    let preview_timer_ids = [];
    let preview_end_timer_id = null;
    let active_fruit_list = [];

    function shuffle_array(array) {
      // 원본 배열은 건드리지 않기 위해 복사본을 만듭니다.
      const shuffled_array = [...array];

      // Fisher-Yates 방식으로 배열을 섞습니다.
      // 이 방식은 sort + Math.random()보다 더 안정적으로 무작위 순서를 만듭니다.
      for (let index = shuffled_array.length - 1; index > 0; index -= 1) {
        const random_index = Math.floor(Math.random() * (index + 1));
        [shuffled_array[index], shuffled_array[random_index]] = [shuffled_array[random_index], shuffled_array[index]];
      }

      return shuffled_array;
    }

    function set_message(text, is_done = false) {
      // 하단 안내 문구를 바꾸고, 클리어 상태면 강조 스타일을 줍니다.
      message_element.textContent = text;
      message_element.classList.toggle("done", is_done);
    }

    function reset_selected_cards() {
      // 한 번의 시도 처리가 끝나면 선택한 카드 정보를 초기화합니다.
      first_card = null;
      second_card = null;
      board_locked = false;
    }

    function update_attempt_count() {
      // 화면에 보이는 시도 횟수를 숫자 상태와 맞춥니다.
      attempt_count_element.textContent = attempt_count;
    }

    function clear_all_timers() {
      // 시작 버튼을 다시 눌렀을 때 이전 타이머가 남아 있으면 예외가 날 수 있으므로 모두 정리합니다.
      if (mismatch_timer_id) {
        clearTimeout(mismatch_timer_id);
        mismatch_timer_id = null;
      }

      if (preview_end_timer_id) {
        clearTimeout(preview_end_timer_id);
        preview_end_timer_id = null;
      }

      preview_timer_ids.forEach((timer_id) => clearTimeout(timer_id));
      preview_timer_ids = [];
    }

    function mark_cards_as_matched(first_element, second_element) {
      // 같은 그림인 카드 2장은 맞춘 상태로 고정합니다.
      first_element.classList.add("matched");
      second_element.classList.add("matched");
      first_element.disabled = true;
      second_element.disabled = true;
      matched_pairs += 1;
    }

    function is_game_clear() {
      // 모든 그림 쌍을 맞췄는지 확인합니다.
      return matched_pairs === pair_count;
    }

    function show_clear_message() {
      // 게임을 모두 맞췄을 때 보여줄 문구입니다.
      board_locked = true;
      is_game_ready = false;
      set_board_activity(false);
      set_all_card_disabled(true);
      set_message(`축하합니다! ${attempt_count}번 만에 모두 맞췄습니다.`, true);
    }

    function reveal_card(card_element) {
      // 카드 앞면이 보이도록 뒤집는 역할입니다.
      card_element.classList.add("flipped");
    }

    function hide_card(card_element) {
      // 맞지 않는 카드 두 장을 다시 뒤집는 역할입니다.
      // 재시작 직후에는 카드 요소가 없을 수 있으므로 먼저 확인합니다.
      if (!card_element || !card_element.classList) {
        return;
      }

      card_element.classList.remove("flipped");
    }

    function compare_cards() {
      // 두 카드의 data-value가 같으면 같은 그림입니다.
      return first_card.dataset.value === second_card.dataset.value;
    }

    function handle_matched_pair() {
      // 같은 그림이면 카드들을 맞춘 상태로 표시하고, 턴을 초기화합니다.
      mark_cards_as_matched(first_card, second_card);
      set_message("잘 찾았어요! 같은 그림입니다.");
      reset_selected_cards();

      if (is_game_clear()) {
        show_clear_message();
      }
    }

    function handle_mismatched_pair() {
      // 다른 그림이면 잠깐 보여준 뒤 다시 뒤집습니다.
      set_message("다른 그림입니다. 잠깐 뒤에 다시 뒤집어요.");

      mismatch_timer_id = setTimeout(() => {
        // 재시작 후에는 first_card / second_card가 null이 될 수 있으므로
        // 카드가 실제로 남아 있는지 먼저 확인합니다.
        if (!first_card || !second_card) {
          mismatch_timer_id = null;
          return;
        }

        hide_card(first_card);
        hide_card(second_card);
        set_message("다시 같은 그림을 찾아보세요.");
        reset_selected_cards();
        mismatch_timer_id = null;
      }, 700);
    }

    function handle_second_selection(card_element) {
      // 두 번째 카드를 선택했을 때 매칭 비교를 시작합니다.
      second_card = card_element;
      attempt_count += 1;
      update_attempt_count();
      board_locked = true;

      if (compare_cards()) {
        handle_matched_pair();
        return;
      }

      handle_mismatched_pair();
    }

    function handle_card_click(card_element) {
      // 게임이 아직 시작되지 않았거나, 이미 맞춘 카드, 같은 카드 재클릭, 비교 중인 상태는 무시합니다.
      if (!is_game_ready || board_locked || card_element === first_card || card_element.classList.contains("matched")) {
        return;
      }

      reveal_card(card_element);

      if (!first_card) {
        // 첫 번째 카드가 아직 없다면 지금 카드를 저장합니다.
        first_card = card_element;
        return;
      }

      // 두 번째 카드까지 선택되면 비교 로직으로 넘어갑니다.
      handle_second_selection(card_element);
    }

    function create_card_element(emoji) {
      // 카드 1장을 버튼 요소로 만듭니다.
      const card_element = document.createElement("button");
      card_element.type = "button";
      card_element.className = "card";
      card_element.dataset.value = emoji;
      card_element.setAttribute("aria-label", "카드");
      card_element.disabled = true;

      // 카드 안에 실제로 보여줄 그림을 넣습니다.
      const emoji_element = document.createElement("span");
      emoji_element.className = "emoji";
      emoji_element.textContent = emoji;

      card_element.appendChild(emoji_element);
      card_element.addEventListener("click", () => handle_card_click(card_element));

      return card_element;
    }

    function set_board_activity(is_active) {
      // 보드 전체를 활성화하거나 비활성화합니다.
      board_element.classList.toggle("inactive", !is_active);
    }

    function set_all_card_disabled(is_disabled) {
      // 보드 안의 모든 카드를 한 번에 활성화하거나 비활성화합니다.
      board_element.querySelectorAll(".card").forEach((card_element) => {
        card_element.disabled = is_disabled;
      });
    }

    function pick_random_fruits() {
      // 과일 풀에서 8개를 무작위로 골라 한 판에서 사용할 목록을 만듭니다.
      const shuffled_fruit_pool = shuffle_array(fruit_pool);
      return shuffled_fruit_pool.slice(0, pair_count);
    }

    function create_card_emoji_list() {
      // 선택된 과일 8개를 2장씩 복제해서 총 16장 카드 목록을 만듭니다.
      return shuffle_array([...active_fruit_list, ...active_fruit_list]);
    }

    function render_board() {
      // 1번부터 16번까지 위치는 고정하고, 그 자리에 과일만 랜덤으로 배치합니다.
      const shuffled_emoji_list = create_card_emoji_list();
      board_element.innerHTML = "";

      // 항상 1번 카드가 왼쪽 위, 16번 카드가 오른쪽 아래가 됩니다.
      shuffled_emoji_list.forEach((emoji) => {
        const card_element = create_card_element(emoji);
        board_element.appendChild(card_element);
      });
    }

    function prepare_game() {
      // 새로고침이나 다시 시작을 눌렀을 때는 보드만 준비하고 바로 시작하지 않습니다.
      clear_all_timers();

      first_card = null;
      second_card = null;
      board_locked = true;
      is_game_ready = false;
      attempt_count = 0;
      matched_pairs = 0;
      update_attempt_count();
      set_message("게임 시작 버튼을 눌러주세요.");

      active_fruit_list = pick_random_fruits();
      render_board();
      set_board_activity(false);
      set_all_card_disabled(true);
      clear_preview_state();
    }

    function clear_preview_state() {
      // 프리뷰가 끝나면 모든 카드를 다시 숨긴 상태로 정리합니다.
      board_element.querySelectorAll(".card.previewing").forEach((card_element) => {
        card_element.classList.remove("previewing");
        card_element.classList.remove("flipped");
      });

      board_element.classList.remove("previewing");
    }

    function start_preview_sequence() {
      // 카드 1번부터 16번까지 순서대로 잠깐씩 보여줍니다.
      const card_elements = Array.from(board_element.querySelectorAll(".card"));

      board_locked = true;
      is_game_ready = false;
      set_board_activity(true);
      set_all_card_disabled(true);
      set_message("카드가 순서대로 열립니다. 위치를 기억해 보세요.");
      board_element.classList.add("previewing");

      card_elements.forEach((card_element, index) => {
        const timer_id = setTimeout(() => {
          if (!board_element.contains(card_element)) {
            return;
          }

          card_element.classList.add("previewing");
          reveal_card(card_element);
        }, index * preview_step_ms);

        preview_timer_ids.push(timer_id);
      });

      preview_end_timer_id = setTimeout(() => {
        clear_preview_state();
        set_all_card_disabled(false);
        is_game_ready = true;
        board_locked = false;
        set_message("같은 그림을 찾아서 짝을 맞춰보세요.");
      }, preview_duration_ms);
    }

    function start_game() {
      // 게임 시작 버튼을 눌렀을 때만 프리뷰를 보여주고 실제 게임을 시작합니다.
      prepare_game();
      start_preview_sequence();
    }

    start_button.addEventListener("click", start_game);
    restart_button.addEventListener("click", prepare_game);

    // 페이지가 열리면 바로 보드를 준비하지만, 자동으로 시작하지는 않습니다.
    prepare_game();
  </script>
</body>
</html>
