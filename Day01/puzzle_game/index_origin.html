<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단한 퍼즐 게임</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --card-bg: #ffffff;
      --board-bg: #f8fafc;
      --tile: #bdf5cb;
      --tile-border: #9cdcb0;
      --text: #1f2937;
      --subtext: #6b7280;
      --primary: #2f6fed;
      --primary-dark: #2159c8;
      --success: #1f9d55;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 45%),
        linear-gradient(180deg, #f7f8fc 0%, #edf1f7 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .app {
      width: min(100%, 430px);
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px 20px 22px;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--subtext);
      font-size: 15px;
      line-height: 1.6;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 16px;
      flex-wrap: wrap;
    }

    .attempts {
      font-size: 16px;
      font-weight: 700;
    }

    .restart {
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
      box-shadow: 0 10px 18px rgba(47, 111, 237, 0.18);
    }

    .restart:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      background: var(--board-bg);
      padding: 6px;
      border-radius: 22px;
    }

    .tile {
      aspect-ratio: 1;
      border: 1px solid var(--tile-border);
      border-radius: 16px;
      background: linear-gradient(180deg, #c8f7d3 0%, var(--tile) 100%);
      display: grid;
      place-items: center;
      font-size: 30px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
      user-select: none;
    }

    .tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(31, 157, 85, 0.12);
    }

    .tile.revealed,
    .tile.matched {
      background: #e8fbef;
      cursor: default;
    }

    .tile.matched {
      border-color: #8dd9a5;
    }

    .tile span {
      display: none;
    }

    .tile.revealed span,
    .tile.matched span {
      display: block;
    }

    .tile.revealed {
      animation: pop 0.18s ease;
    }

    .message {
      margin: 16px 6px 0;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      min-height: 22px;
    }

    .message.success {
      color: var(--success);
    }

    @keyframes pop {
      from {
        transform: scale(0.96);
      }
      to {
        transform: scale(1);
      }
    }

    @media (max-width: 420px) {
      .app {
        padding: 22px 14px 18px;
      }

      h1 {
        font-size: 26px;
      }

      .tile {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>간단한 퍼즐 게임</h1>
      <p class="subtitle">같은 그림 2개를 찾아 모두 맞추면 클리어입니다.</p>
    </header>

    <section class="topbar" aria-label="게임 정보">
      <div class="attempts">시도 횟수: <span id="attemptCount">0</span></div>
      <button class="restart" id="restartBtn" type="button">다시 시작</button>
    </section>

    <section class="board" id="board" aria-label="퍼즐 보드"></section>

    <p class="message" id="message">카드를 눌러 게임을 시작해 보세요.</p>
  </main>

  <script>
    // 퍼즐 카드에 사용할 그림들입니다.
    const CARD_VALUES = ["🍇", "🍓", "🥝", "🍎", "🍉", "🍑", "🍒", "🍍"];

    const board = document.getElementById("board");
    const attemptCount = document.getElementById("attemptCount");
    const restartBtn = document.getElementById("restartBtn");
    const message = document.getElementById("message");

    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let attempts = 0;
    let matchedPairs = 0;

    // 배열의 순서를 무작위로 섞는 함수입니다.
    // 같은 카드들이 항상 같은 위치에 나오지 않도록 하기 위해 사용합니다.
    function shuffle(array) {
      const result = [...array];

      // 뒤에서부터 하나씩 고르면서 자리 바꾸기를 반복합니다.
      // 이렇게 하면 배열을 공정하게 섞을 수 있습니다.
      for (let i = result.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }

      return result;
    }

    function setMessage(text, isSuccess = false) {
      message.textContent = text;
      message.className = isSuccess ? "message success" : "message";
    }

    // 화면에 표시되는 시도 횟수를 갱신합니다.
    function updateAttemptCount() {
      attemptCount.textContent = String(attempts);
    }

    // 카드 8개를 2장씩 복제해서 총 16장으로 만들고 섞습니다.
    // 각 카드에는 id, 그림, 공개 여부, 매칭 여부가 들어갑니다.
    function createCards() {
      const shuffled = shuffle([...CARD_VALUES, ...CARD_VALUES]);
      cards = shuffled.map((value, index) => ({
        id: index,
        value,
        revealed: false,
        matched: false,
      }));
    }

    // 현재 카드 상태를 보고 보드를 다시 그립니다.
    // revealed 또는 matched 상태인 카드만 그림이 보입니다.
    function renderBoard() {
      board.innerHTML = "";

      cards.forEach((card) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tile";
        button.dataset.id = String(card.id);
        button.setAttribute("aria-label", "숨겨진 카드");

        if (card.revealed) {
          button.classList.add("revealed");
          button.setAttribute("aria-label", `열린 카드 ${card.value}`);
        }

        if (card.matched) {
          button.classList.add("matched");
          button.setAttribute("aria-label", `맞춘 카드 ${card.value}`);
        }

        button.innerHTML = `<span>${card.value}</span>`;
        board.appendChild(button);
      });
    }

    // 카드 2장을 고른 뒤에는 선택 정보를 초기화합니다.
    // 다음 클릭을 자연스럽게 받기 위해 사용합니다.
    function resetSelection() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    // 모든 카드 쌍을 맞췄는지 확인합니다.
    // 다 맞췄다면 클리어 메시지를 보여줍니다.
    function checkClear() {
      if (matchedPairs === CARD_VALUES.length) {
        setMessage(`축하합니다! ${attempts}번 만에 모두 맞췄습니다.`, true);
      }
    }

    // 카드가 다르다면 잠깐 보여준 뒤 다시 뒤집습니다.
    // 사용자가 어떤 카드였는지 기억할 시간을 줍니다.
    function handleMismatch() {
      setTimeout(() => {
        firstCard.revealed = false;
        secondCard.revealed = false;
        renderBoard();
        resetSelection();
        setMessage("다시 한 번 맞춰 보세요.");
      }, 700);
    }

    // 같은 카드 2장을 찾았을 때 처리합니다.
    // 둘 다 matched 상태로 바꾸고 매칭 개수를 올립니다.
    function handleMatch() {
      firstCard.matched = true;
      secondCard.matched = true;
      matchedPairs += 1;
      renderBoard();
      resetSelection();
      setMessage("정답입니다!");
      checkClear();
    }

    // 사용자가 카드를 클릭했을 때 실행되는 메인 로직입니다.
    // 이미 열렸거나 맞춘 카드는 다시 선택할 수 없습니다.
    function handleCardClick(cardId) {
      if (lockBoard) {
        return;
      }

      const clickedCard = cards.find((card) => card.id === cardId);

      if (!clickedCard || clickedCard.revealed || clickedCard.matched) {
        return;
      }

      clickedCard.revealed = true;
      renderBoard();

      if (!firstCard) {
        firstCard = clickedCard;
        setMessage("두 번째 카드를 골라보세요.");
        return;
      }

      secondCard = clickedCard;
      attempts += 1;
      updateAttemptCount();
      lockBoard = true;

      if (firstCard.value === secondCard.value) {
        handleMatch();
        return;
      }

      setMessage("틀렸습니다. 잠시 뒤 다시 뒤집힙니다.");
      handleMismatch();
    }

    // 새 게임을 시작할 때 모든 상태를 초기화합니다.
    function startGame() {
      attempts = 0;
      matchedPairs = 0;
      updateAttemptCount();
      setMessage("카드를 눌러 게임을 시작해 보세요.");
      createCards();
      resetSelection();
      renderBoard();
    }

    board.addEventListener("click", (event) => {
      const tile = event.target.closest(".tile");

      if (!tile) {
        return;
      }

      handleCardClick(Number(tile.dataset.id));
    });

    restartBtn.addEventListener("click", startGame);

    // 처음 화면이 열리면 바로 게임을 준비합니다.
    startGame();
  </script>
</body>
</html>
